<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
</head>
<body>
    <form action="">
        <fieldset>
        <legend>Calendar</legend>
        <input type="text" name="name" required=""
         placeholder="welcome the side" readonly="" value="shivi" autofocus><br/><br/>
         <input type="text" name="name" required=""
         placeholder="welcome the side" disabled="" value="shivi" autofocus><br/><br/>
        Date : <input type="date" name="date"/>
        <br/><br/>
        Name:
        <input type="text" name="name" maxlength="30"><br/><br/>
        Date Time :
        <input type="datetime-local" name="datetime-local">
        <br/><br/>
        Time :
        <input type="time" name="time"/>
        <br/><br/>
         Month :
        <input type="month" name="month"/>
        <br/><br/>
         week :
        <input type="week" name="week"/>
        <br/><br/>
         Age :
        <input type="number" name="number" min="1" max="30"/>
        <br/><br/>
         Range :
        <input type="range" name="range" min="10" max="100"/>
        <br/><br/>
        <input type="submit">
        </fieldset>
    </form>
</body>
</html>
