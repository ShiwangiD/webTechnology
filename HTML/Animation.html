<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .box-container{
            height:600px;
            width: 600px;
            border:2px solid black;
            margin: auto;
            position: relative;
        }
        .box{
            height:100px;
            width:100px;
            border:2px solid black;
            background-color: red;
            position: absolute;
            top:300px;
            left:400px;
            animation-name: box;
            animation-duration: 3s;
            /* animation-delay: 5s; */
            animation-iteration-count: 5;
            /* animation-fill-mode:backwards; */
            /* animation-direction: alternate; */
            animation-timing-function: linear;
        }
        @keyframes box{
            0%{
                top:0;
                left: 0;
                background-color:red;
            }
              25%{
                top:0;
                left:400px;
                background-color:rgb(207, 189, 30);
            }
              50%{
                top:400px;
                left:400px;
                background-color:rgb(29, 40, 141);
            }
            
              75%{
                top:400px;
                left: 0;
                background-color:rgb(62, 36, 36);
            }
             100%{
                top:0;
                left: 0;
                background-color:rgb(122, 19, 84);
            }
            
            
            
        }
    </style>
</head>
<body>
    <div class="box-container">
        <div class="box">

        </div>
    </div>
</body>
</html>
