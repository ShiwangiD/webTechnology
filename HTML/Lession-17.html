<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opacity</title>
    <style>
        .main{
            height:200px;
            width:200px;
            background-color: rgb(140, 42, 117);
            opacity: 0.5;
            transition: 0.3s;
        }
        .main:hover{
            background-color: brown;
        }
        .box{
            height: 200px;
            width: 200px;
            margin: auto;
            border: 10px solid gray;
            position: relative;
        }
        .add{
            width:100%;
            font-size: 30px;
            background-color:lightblue;
            position: absolute;
            left:0px;
            bottom: 0px;
            color:black;
            opacity:0;
            transition: 1s;
        }
        .box:hover .add{
            bottom: 0px;
            opacity: 1;

        }
    </style>
</head>
<body>
    <div class="main"></div>
    <div class="box">
        <img src="Images/img1.jpg" alt="" width="100%" height="100%">
        <input type="submit" value="Add To Card" class="add">
    </div>
</body>
</html>
