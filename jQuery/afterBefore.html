<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div id="div1" style="background-color:aqua; height: 200px; width:300px; border: 5px solid red;">
        <h1>Heading 1</h1>
        <h2>Heading 2</h2>
        <h3>Heading 3</h3>
    </div>
    <br>
    <br>

    
    <input type="button" value="after" id="btn1">
    <input type="button" value="before" id="btn2">

    <script src="jquery.js"></script>
    <script>
        $(document).ready(function(){
            $("#btn1").click(function(){
                $("#div1").after("<p>new paragraph</p>");
             });
             $("#btn2").click(function(){
                $("#div1").before("<p>new paragraph</p>");
             });
        });
    </script>
</body>
</html>
