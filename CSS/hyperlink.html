<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div</title>
    
    <style>
        .text{
            background-color: red;
            height: 200px;
            width: 500px;
            font-size: 40px;
            color:white;
            font-weight:bold;
            font-style:oblique;
            text-transform: uppercase;
            text-align: center;
            text-decoration: underline;
            word-spacing:20px;
            letter-spacing: 2px;
        }
        .para{
            height: 200px;
            width:1000px;
            background-color:blue;
            color:white;
            font-size: 20px;
            text-align: justify;
        }
        .anchor{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="text">
        Weclcome To The Css Page
    </div>
    <a href="" class="anchor">onClick</a>
    <p class="para">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Maxime vero eligendi sequi earum dolore doloribus, aspernatur doloremque quam culpa laborum illum dolorem soluta debitis voluptatum facere inventore perferendis non unde.</p>
</body>
</html>
